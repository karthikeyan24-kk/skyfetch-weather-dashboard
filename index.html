<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyFetch Weather</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Axios CDN -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <main class="dashboard">
        <header class="header">
            <h1>SkyFetch</h1>
        </header>
        
        <section class="weather-card">
            <!-- Search section added before weather info display -->
            <div class="search-section">
                <input type="text" id="city-input" placeholder="Enter city name...">
                <button id="search-btn">Search</button>
            </div>
            
            <!-- Recent Searches Section -->
            <div class="recent-searches">
                <div id="recent-container"></div>
                <button id="clear-history-btn" class="hidden">Clear History</button>
            </div>
            
            <div class="weather-info" id="weather-info">
                <!-- Data will be injected here -->
                <p class="loading">Loading weather data...</p>
            </div>
            
            <!-- Forecast Section -->
            <div id="forecast-container" class="forecast-container hidden"></div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
